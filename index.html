<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ADC Outbound — Performance Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#eef1f6; --surface:#ffffff; --surface-2:#f7f9fc;
  --ink:#151a24; --muted:#5c6675; --faint:#8b95a6; --line:#e3e7ef;
  --brand:#6d28d9; --brand-2:#7c3aed; --brand-soft:#f1ebff;
  --teal:#0d9488; --teal-soft:#e2f6f3;
  --amber:#b45309; --amber-soft:#fdf0dc;
  --green:#15803d; --green-soft:#e4f4e9;
  --rose:#e11d48; --rose-soft:#fde7ec;
  --shadow:0 1px 2px rgba(20,26,36,.05), 0 6px 20px -10px rgba(20,26,36,.18);
  --radius:14px; --radius-sm:10px;
  --mono:"Inter",system-ui; --disp:"Space Grotesk",system-ui;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:var(--bg); color:var(--ink);
  font-feature-settings:"tnum" 1,"cv05" 1; -webkit-font-smoothing:antialiased;
}
.tnum{font-variant-numeric:tabular-nums}
h1,h2,h3{font-family:var(--disp);margin:0;letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
a{color:var(--brand)}
.hidden{display:none !important}

/* ---------- shell ---------- */
.app{max-width:1160px;margin:0 auto;padding:0 18px 90px}
.topbar{
  position:sticky;top:0;z-index:40;background:rgba(238,241,246,.85);
  backdrop-filter:saturate(140%) blur(10px);
  border-bottom:1px solid var(--line);
}
.topbar-inner{max-width:1160px;margin:0 auto;padding:12px 18px;display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:center;gap:11px;min-width:0}
.logo-mark{
  width:34px;height:34px;border-radius:9px;flex:0 0 auto;
  background:linear-gradient(135deg,var(--brand),var(--teal));
  display:grid;place-items:center;color:#fff;font-family:var(--disp);font-weight:700;font-size:15px;
  box-shadow:0 4px 12px -4px rgba(109,40,217,.6);
}
.logo-txt strong{display:block;font-family:var(--disp);font-size:15px;letter-spacing:-.02em;line-height:1.1}
.logo-txt span{font-size:11.5px;color:var(--faint);letter-spacing:.04em;text-transform:uppercase}
.spacer{flex:1}
.who{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
.who b{color:var(--ink);font-weight:600}
.pill{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--line);background:var(--surface);color:var(--muted)}
.pill.live{color:var(--green);border-color:var(--green-soft);background:var(--green-soft)}
.pill.off{color:var(--rose);border-color:var(--rose-soft);background:var(--rose-soft)}

/* ---------- nav ---------- */
.nav{display:flex;gap:4px;overflow-x:auto;padding:10px 0 2px;-webkit-overflow-scrolling:touch}
.nav button{
  border:1px solid transparent;background:transparent;color:var(--muted);
  padding:9px 15px;border-radius:10px;font-weight:600;font-size:14px;white-space:nowrap;
  display:flex;align-items:center;gap:8px;
}
.nav button:hover{background:var(--surface);color:var(--ink)}
.nav button.active{background:var(--surface);color:var(--brand);box-shadow:var(--shadow);border-color:var(--line)}
.nav button.locked{color:var(--faint)}
.nav .lockico{font-size:12px}

/* ---------- cards ---------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-pad{padding:20px}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:26px 0 14px;flex-wrap:wrap}
.section-head h2{font-size:20px}
.section-head p{margin:3px 0 0;color:var(--muted);font-size:13.5px}
.eyebrow{font-family:var(--disp);font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--brand)}

/* ---------- controls ---------- */
label.fld{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:6px}
.input,select.input{
  width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:var(--surface-2);
  font-size:15px;color:var(--ink);transition:border-color .12s, box-shadow .12s;
}
.input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft);background:#fff}
.input.bad{border-color:var(--rose);box-shadow:0 0 0 3px var(--rose-soft)}
.btn{
  border:1px solid var(--line);background:var(--surface);color:var(--ink);
  padding:11px 16px;border-radius:10px;font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:8px;
  transition:transform .05s, background .12s, border-color .12s;
}
.btn:hover{background:var(--surface-2)}
.btn:active{transform:translateY(1px)}
.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
.btn.primary:hover{background:var(--brand-2)}
.btn.primary:disabled{background:#c9c4dd;border-color:#c9c4dd;cursor:not-allowed}
.btn.ghost{background:transparent}
.btn.tiny{padding:6px 10px;font-size:12.5px;border-radius:8px}
.btn.danger{color:var(--rose);border-color:var(--rose-soft)}
.btn.danger:hover{background:var(--rose-soft)}
.seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px;flex-wrap:wrap}
.seg button{border:0;background:transparent;color:var(--muted);padding:7px 12px;border-radius:8px;font-weight:600;font-size:13px}
.seg button.active{background:#fff;color:var(--brand);box-shadow:var(--shadow)}

/* ---------- report entry ---------- */
.grid{display:grid;gap:14px}
.entry-grid{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
.numwrap{background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:12px 13px}
.numwrap label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:7px;line-height:1.2}
.numwrap input{width:100%;border:0;background:transparent;font-family:var(--disp);font-size:26px;font-weight:600;color:var(--ink);padding:0}
.numwrap input:focus{outline:none}
.numwrap.derived{background:var(--brand-soft);border-color:#e4d9ff}
.numwrap.derived .val{font-family:var(--disp);font-size:26px;font-weight:700;color:var(--brand)}
.hintrow{display:flex;justify-content:space-between;font-size:11.5px;color:var(--faint);margin-top:3px}

.bookblock{border:1px dashed var(--line);border-radius:12px;padding:14px;margin-top:8px;background:var(--surface-2)}
.bookblock.cross{background:var(--teal-soft);border-color:#c7eae6}
.bookblock h4{font-family:var(--disp);font-size:14px;margin:0 0 3px;display:flex;align-items:center;gap:8px}
.bookblock .sub{font-size:12px;color:var(--muted);margin-bottom:10px}
.refrow{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.refrow .idx{font-family:var(--disp);font-weight:700;color:var(--faint);width:22px;text-align:center;flex:0 0 auto}
.refrow input{flex:1;letter-spacing:.28em;font-family:var(--disp);font-weight:600;text-align:center}
.refrow .ok{color:var(--green);font-weight:700}
.refrow .warn{color:var(--rose);font-size:11.5px}
.checkline{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);margin-top:4px}

/* ---------- meeting / roster ---------- */
.roster{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(230px,1fr))}
.agent-card{cursor:pointer;transition:transform .1s, box-shadow .15s;overflow:hidden}
.agent-card:hover{transform:translateY(-2px);box-shadow:0 10px 30px -14px rgba(20,26,36,.35)}
.agent-card .ac-top{display:flex;align-items:center;gap:12px;padding:16px}
.avatar{width:44px;height:44px;border-radius:12px;flex:0 0 auto;display:grid;place-items:center;color:#fff;font-family:var(--disp);font-weight:700;font-size:17px}
.ac-name{font-family:var(--disp);font-weight:600;font-size:16px;line-height:1.1}
.ac-sub{font-size:12px;color:var(--faint);margin-top:2px}
.ac-stats{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--line)}
.ac-stat{padding:11px 8px;text-align:center;border-right:1px solid var(--line)}
.ac-stat:last-child{border-right:0}
.ac-stat b{display:block;font-family:var(--disp);font-size:18px}
.ac-stat span{font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.04em}
.spark{height:34px;width:100%;display:block}

/* ---------- modal ---------- */
.modal-back{position:fixed;inset:0;background:rgba(21,26,36,.5);backdrop-filter:blur(3px);z-index:60;display:grid;place-items:center;padding:18px}
.modal{background:var(--surface);border-radius:18px;box-shadow:0 30px 70px -20px rgba(0,0,0,.5);width:100%;max-width:760px;max-height:90vh;overflow:auto}
.modal-head{position:sticky;top:0;background:var(--surface);display:flex;align-items:center;gap:14px;padding:18px 20px;border-bottom:1px solid var(--line);z-index:2}
.modal-head .x{margin-left:auto;border:0;background:var(--surface-2);width:34px;height:34px;border-radius:9px;font-size:18px;color:var(--muted)}
.modal-body{padding:20px}
.kpis{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(120px,1fr))}
.kpi{background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:13px}
.kpi .lab{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.05em}
.kpi .num{font-family:var(--disp);font-size:24px;font-weight:600;margin-top:4px}
.kpi .num small{font-size:13px;color:var(--muted);font-weight:500}

/* ---------- scorecard ---------- */
.sc-group{margin-top:18px}
.sc-group > .lab{font-family:var(--disp);font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:0 0 10px}
.sc-grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(168px,1fr))}
.metric{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 15px;box-shadow:var(--shadow)}
.metric .m-lab{font-size:12px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:5px}
.metric .m-val{font-family:var(--disp);font-size:27px;font-weight:600;margin-top:6px;line-height:1}
.metric .m-sub{font-size:11.5px;color:var(--faint);margin-top:5px}
.metric.accent .m-val{color:var(--brand)}
.metric.green .m-val{color:var(--green)}
.metric.rose .m-val{color:var(--rose)}
.tip{position:relative;color:var(--faint);cursor:help;font-size:11px;border:1px solid var(--line);border-radius:50%;width:15px;height:15px;display:inline-grid;place-items:center;line-height:1}
.tip:hover::after{content:attr(data-tip);position:absolute;bottom:135%;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:11px;font-weight:500;padding:7px 9px;border-radius:8px;width:190px;z-index:5;box-shadow:var(--shadow)}

/* ---------- admin ---------- */
.summary3{display:grid;gap:14px;grid-template-columns:repeat(3,1fr)}
.sumcard{padding:16px}
.sumcard h3{font-size:14px;color:var(--muted);font-weight:600;font-family:var(--disp)}
.sumcard .big{font-family:var(--disp);font-size:32px;font-weight:700;margin:6px 0 2px}
.sumline{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-top:1px solid var(--line);color:var(--muted)}
.sumline b{color:var(--ink);font-weight:600}
table.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
table.tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--faint);padding:9px 10px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--surface)}
table.tbl td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
table.tbl tr:hover td{background:var(--surface-2)}
.tag{font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;display:inline-block}
.tag.booking{background:var(--brand-soft);color:var(--brand)}
.tag.crossbooking{background:var(--teal-soft);color:var(--teal)}
.tag.pending{background:var(--surface-2);color:var(--muted)}
.tag.sold{background:var(--green-soft);color:var(--green)}
.tag.cancelled{background:var(--rose-soft);color:var(--rose)}
.tag.ran_not_sold{background:var(--amber-soft);color:var(--amber)}
.jobref{font-family:var(--disp);font-weight:700;letter-spacing:.15em}
.amt-input{width:96px;padding:6px 8px;border:1px solid var(--line);border-radius:8px;background:var(--surface-2);font-size:13px}
.st-select{padding:6px 8px;border:1px solid var(--line);border-radius:8px;background:var(--surface-2);font-size:12.5px}

/* ---------- gate / setup ---------- */
.center-wrap{min-height:70vh;display:grid;place-items:center;padding:24px}
.gate{max-width:440px;width:100%;text-align:center}
.gate .lockbig{width:64px;height:64px;border-radius:18px;margin:0 auto 16px;display:grid;place-items:center;background:var(--brand-soft);color:var(--brand);font-size:28px}
.gate h2{font-size:22px}
.gate p{color:var(--muted);font-size:14px;margin:8px 0 20px}
.codebox{background:#12151c;color:#d5deea;border-radius:12px;padding:14px;font-family:ui-monospace,Menlo,monospace;font-size:12px;text-align:left;white-space:pre-wrap;overflow:auto;max-height:260px}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--ink);color:#fff;padding:12px 18px;border-radius:12px;font-size:14px;font-weight:500;z-index:90;transition:transform .2s, opacity .2s;box-shadow:var(--shadow);max-width:90vw}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.err{background:var(--rose)}
.empty{text-align:center;color:var(--faint);padding:40px 20px;font-size:14px}
.bar-track{height:7px;border-radius:6px;background:var(--surface-2);overflow:hidden;margin-top:8px}
.bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--brand),var(--teal))}

@media(max-width:720px){
  .summary3{grid-template-columns:1fr}
  .section-head h2{font-size:18px}
  .modal-head{padding:14px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="logo">
      <div class="logo-mark">AD</div>
      <div class="logo-txt">
        <strong>ADC Outbound</strong>
        <span>Performance Board</span>
      </div>
    </div>
    <div class="spacer"></div>
    <div class="who" id="whoami"></div>
    <span class="pill" id="connPill">connecting…</span>
  </div>
  <div class="topbar-inner" style="padding-top:0;padding-bottom:6px">
    <nav class="nav" id="nav"></nav>
  </div>
</div>

<div class="app" id="app"></div>

<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* =========================================================================
   ADC Outbound Performance Board  —  single-file app
   ========================================================================= */
const LS = {
  conf:'adc_supabase_conf',
  agent:'adc_device_agent',       // which agent this device belongs to
  adminSession:'adc_admin_session'
};
let sb = null;                    // supabase client

/* schema text embedded for the setup screen */
const SCHEMA_SQL = `-- Run in Supabase > SQL Editor. Full file also shipped as schema.sql
create table if not exists agents(
  id uuid primary key default gen_random_uuid(),
  name text not null unique, active boolean not null default true,
  target_bookings int not null default 5, target_crossbookings int not null default 3,
  sort_order int not null default 0, created_at timestamptz not null default now());
create table if not exists daily_reports(
  id uuid primary key default gen_random_uuid(),
  agent_id uuid not null references agents(id) on delete cascade,
  report_date date not null,
  total_calls int not null default 0, reached_contacts int not null default 0,
  no_answer int not null default 0, not_interested int not null default 0,
  follow_up_needed int not null default 0, note text,
  submitted_at timestamptz not null default now(), updated_at timestamptz not null default now(),
  unique(agent_id,report_date));
create table if not exists bookings(
  id uuid primary key default gen_random_uuid(),
  agent_id uuid not null references agents(id) on delete cascade,
  report_date date not null,
  kind text not null check(kind in('booking','crossbooking')),
  job_ref text not null, sale_amount numeric(12,2),
  status text not null default 'pending' check(status in('pending','ran_not_sold','sold','cancelled')),
  created_at timestamptz not null default now(), updated_at timestamptz not null default now());
create table if not exists admin_credentials(
  id uuid primary key default gen_random_uuid(),
  credential_id text not null unique, label text, created_at timestamptz not null default now());
alter table agents enable row level security;
alter table daily_reports enable row level security;
alter table bookings enable row level security;
alter table admin_credentials enable row level security;
create policy anon_all on agents for all using(true) with check(true);
create policy anon_all on daily_reports for all using(true) with check(true);
create policy anon_all on bookings for all using(true) with check(true);
create policy anon_all on admin_credentials for all using(true) with check(true);
insert into agents(name,sort_order) values
 ('Shiena',1),('Levi',2),('Reagan',3),('Jane',4),('Felicia',5),('Toni',6)
 on conflict(name) do nothing;`;
let STATE = {
  agents:[], reports:[], bookings:[],
  view:'report',
  isAdmin:false,
  scPeriod:'last7', scAgent:'all',
  loaded:false
};

/* ---------- tiny helpers ---------- */
const $ = (s,r=document)=>r.querySelector(s);
const el = (t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;};
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const money = n => (n||n===0)? '$'+Number(n).toLocaleString(undefined,{maximumFractionDigits:0}) : '—';
const pct = (n,d)=> d>0 ? (100*n/d).toFixed(1)+'%' : '—';
const round1 = n => isFinite(n)? Math.round(n*10)/10 : 0;
function toast(msg,isErr){const t=$('#toast');t.textContent=msg;t.className='toast show'+(isErr?' err':'');clearTimeout(t._t);t._t=setTimeout(()=>t.className='toast',2600);}
function colorFor(name){let h=0;for(const c of (name||'')) h=(h*31+c.charCodeAt(0))>>>0;const hue=h%360;return `hsl(${hue} 62% 48%)`;}
function initials(name){return (name||'?').trim().split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase();}

/* ---------- date helpers (local) ---------- */
const iso = d => { const z=new Date(d.getTime()-d.getTimezoneOffset()*60000); return z.toISOString().slice(0,10); };
const today = ()=> iso(new Date());
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
function startOfWeek(d){const x=new Date(d);const g=(x.getDay()+6)%7;x.setDate(x.getDate()-g);x.setHours(0,0,0,0);return x;} // Monday
function periodRange(key){
  const now=new Date(); now.setHours(0,0,0,0);
  if(key==='yesterday'){const y=addDays(now,-1);return[iso(y),iso(y),'Yesterday'];}
  if(key==='thisweek'){const s=startOfWeek(now);return[iso(s),iso(now),'This week'];}
  if(key==='lastweek'){const s=addDays(startOfWeek(now),-7);const e=addDays(s,6);return[iso(s),iso(e),'Last week'];}
  if(key==='thismonth'){const s=new Date(now.getFullYear(),now.getMonth(),1);return[iso(s),iso(now),'This month'];}
  if(key==='lastmonth'){const s=new Date(now.getFullYear(),now.getMonth()-1,1);const e=new Date(now.getFullYear(),now.getMonth(),0);return[iso(s),iso(e),'Last month'];}
  if(key==='last7'){return[iso(addDays(now,-6)),iso(now),'Last 7 days'];}
  if(key==='last30'){return[iso(addDays(now,-29)),iso(now),'Last 30 days'];}
  return[iso(addDays(now,-6)),iso(now),'Last 7 days'];
}
const inRange=(d,a,b)=> d>=a && d<=b;

/* =========================================================================
   Supabase connection / setup
   ========================================================================= */
function loadConf(){ try{return JSON.parse(localStorage.getItem(LS.conf))}catch(e){return null} }
function saveConf(c){ localStorage.setItem(LS.conf, JSON.stringify(c)); }

async function connect(){
  const c = loadConf();
  if(!c || !c.url || !c.key){ renderSetup(); return false; }
  try{
    sb = window.supabase.createClient(c.url, c.key);
    const {error} = await sb.from('agents').select('id').limit(1);
    if(error) throw error;
    setConn(true);
    return true;
  }catch(e){
    setConn(false);
    renderSetup(e.message||'Could not reach Supabase.');
    return false;
  }
}
function setConn(ok){
  const p=$('#connPill');
  p.textContent = ok?'live':'offline';
  p.className = 'pill '+(ok?'live':'off');
}

/* =========================================================================
   Data load
   ========================================================================= */
async function loadAll(){
  const [ag, rp, bk] = await Promise.all([
    sb.from('agents').select('*').order('sort_order'),
    sb.from('daily_reports').select('*'),
    sb.from('bookings').select('*')
  ]);
  if(ag.error||rp.error||bk.error){ toast('Load failed — check schema is installed',true); }
  STATE.agents = ag.data||[];
  STATE.reports = rp.data||[];
  STATE.bookings = bk.data||[];
  STATE.loaded = true;
}

/* =========================================================================
   Metric engine  (period + agent filter -> full scorecard object)
   ========================================================================= */
function compute(a,b,agentId){
  const rs = STATE.reports.filter(r=> inRange(r.report_date,a,b) && (agentId==='all'||r.agent_id===agentId));
  const bs = STATE.bookings.filter(x=> inRange(x.report_date,a,b) && (agentId==='all'||x.agent_id===agentId));
  const sum=k=>rs.reduce((t,r)=>t+(+r[k]||0),0);

  const totalCalls=sum('total_calls'), reached=sum('reached_contacts');
  const noAnswer=sum('no_answer'), notInt=sum('not_interested'), followUp=sum('follow_up_needed');

  const booked = bs.filter(x=>x.kind==='booking').length;
  const cross  = bs.filter(x=>x.kind==='crossbooking').length;
  const scheduled = bs.length;                                  // jobs scheduled = all appts
  const sold = bs.filter(x=>x.status==='sold');
  const soldN = sold.length;
  const runs = bs.filter(x=>x.status==='sold'||x.status==='ran_not_sold').length;
  const cancelled = bs.filter(x=>x.status==='cancelled').length;
  const revenue = sold.reduce((t,x)=>t+(+x.sale_amount||0),0);
  const revenueCross = sold.filter(x=>x.kind==='crossbooking').reduce((t,x)=>t+(+x.sale_amount||0),0);
  const leads = booked+cross;

  const agentsN = new Set(rs.map(r=>r.agent_id)).size;

  return {
    agentsN, totalCalls, reached, noAnswer, notInt, followUp,
    booked, cross, scheduled, soldN, runs, cancelled, revenue, revenueCross, leads,
    reachRate: reached/(totalCalls||1),
    contactToBooking: booked/(reached||1),
    callToBooking: booked/(totalCalls||1),
    adl: revenue/(leads||1),                 // Avg $ per lead
    avt: revenue/(soldN||1),                 // Avg value per ticket
    revPerCall: revenue/(totalCalls||1),
    cancelPct: cancelled/(scheduled||1)
  };
}

/* per-agent quick stats over last 30 days for meeting cards */
function agentQuick(agentId){
  const [a,b]=periodRange('last30');
  return compute(a,b,agentId);
}

  cWrap.innerHTML=`<h4>🔁 Cross-Bookings <span class="tag crossbooking">job ref required</span></h4>

  foot.appendChild(submit); foot.appendChild(status);

  function makeRow(kind, ref){
    const row=el('div','refrow');
    const list = kind==='booking'?'#rows_booking':'#rows_cross';
    row.innerHTML=`<span class="idx"></span>
      <input maxlength="5" inputmode="numeric" placeholder="00000" value="${esc(ref||'')}">
      <span class="state warn" style="width:150px"></span>
      <button class="btn tiny danger">✕</button>`;
    const input=row.querySelector('input');
    input.addEventListener('input',()=>{input.value=input.value.replace(/\D/g,'').slice(0,5);validate();});
    row.querySelector('button').onclick=()=>{row.remove();reindex();validate();};
    $(list,form).appendChild(row);
    reindex(); validate(); input.focus();
  }
  function reindex(){
    ['#rows_booking','#rows_cross'].forEach(sel=>{

    });

    $('#cnt_cross',form).textContent = form.querySelectorAll('#rows_cross .refrow').length;
  }
  function validate(){
    let ok=true, bad=0;
    form.querySelectorAll('.refrow').forEach(r=>{
      const inp=r.querySelector('input'); const st=r.querySelector('.state');
      const v=inp.value;
      if(/^\d{5}$/.test(v)){ inp.classList.remove('bad'); st.className='state ok'; st.textContent='✓'; }
      else { inp.classList.add('bad'); st.className='state warn'; st.textContent=v.length?'needs 5 digits':'enter 5-digit ref'; ok=false; bad++; }
    });
    // duplicate check
    const refs=[...form.querySelectorAll('.refrow input')].map(i=>i.value).filter(v=>/^\d{5}$/.test(v));
    const dups = refs.filter((v,i)=>refs.indexOf(v)!==i);
    if(dups.length){ ok=false; }
    submit.disabled = !ok;
    status.textContent = ok ? 'Ready to submit.' : (dups.length? 'Duplicate job reference — each must be unique.' : (bad+' booking'+(bad>1?'s':'')+' still need a valid 5-digit reference.'));

  }

  // ---- load existing report for date ----
  async function loadForDate(){
    const d=$('#rp_date',form).value;
    const r=STATE.reports.find(x=>x.agent_id===agent.id && x.report_date===d);
    fields.forEach(([k])=>{ form.querySelector(`[data-k="${k}"]`).value = r? (r[k]??0):0; });
    $('#rp_note',form).value = r? (r.note||''):'';
    form.querySelector('#rows_booking').innerHTML='';
    form.querySelector('#rows_cross').innerHTML='';
    STATE.bookings.filter(x=>x.agent_id===agent.id && x.report_date===d)
      .forEach(x=> makeRow(x.kind==='crossbooking'?'cross':'booking', x.job_ref));
    reindex(); validate();
    status.textContent = r? 'Editing a report already saved for this date.' : 'New report.';
    status.style.color='var(--muted)';
  }
  $('#rp_date',form).onchange=loadForDate;
  loadForDate();

  // ---- submit ----
  submit.onclick=async()=>{
    if(!validate()) return;
    submit.disabled=true; submit.textContent='Saving…';
    const d=$('#rp_date',form).value;
    const payload={ agent_id:agent.id, report_date:d, note:$('#rp_note',form).value||null, submitted_at:new Date().toISOString(), updated_at:new Date().toISOString() };
    fields.forEach(([k])=> payload[k]= +form.querySelector(`[data-k="${k}"]`).value||0 );
    try{
      // upsert report
      const {error:e1}=await sb.from('daily_reports').upsert(payload,{onConflict:'agent_id,report_date'});
      if(e1) throw e1;
      // replace bookings for this agent+date
      await sb.from('bookings').delete().eq('agent_id',agent.id).eq('report_date',d);
      const rows=[];
      form.querySelectorAll('#rows_booking .refrow input').forEach(i=>rows.push({agent_id:agent.id,report_date:d,kind:'booking',job_ref:i.value}));
      form.querySelectorAll('#rows_cross .refrow input').forEach(i=>rows.push({agent_id:agent.id,report_date:d,kind:'crossbooking',job_ref:i.value}));
      if(rows.length){ const {error:e2}=await sb.from('bookings').insert(rows); if(e2) throw e2; }
      await loadAll();
      toast('Report saved for '+d);
      submit.textContent='Submit report'; submit.disabled=false;
      loadForDate();
      const qq=agentQuick(agent.id);
    }catch(err){
      toast('Save failed: '+(err.message||err),true);
      submit.textContent='Submit report'; submit.disabled=false;
    }
  };
}

/* mini 14-day calls sparkline */
function sparkSVG(agentId){
  const days=[]; for(let i=13;i>=0;i--) days.push(iso(addDays(new Date(),-i)));
  const vals=days.map(d=>{const r=STATE.reports.find(x=>x.agent_id===agentId&&x.report_date===d);return r?(+r.total_calls||0):0;});
  const max=Math.max(1,...vals), W=100,H=34,step=W/(vals.length-1||1);
  const pts=vals.map((v,i)=>`${(i*step).toFixed(1)},${(H-4-(v/max)*(H-8)).toFixed(1)}`).join(' ');
  return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <polyline fill="none" stroke="var(--brand)" stroke-width="1.6" points="${pts}" stroke-linejoin="round"/>
  </svg>`;
}

    s3.appendChild(c);
  });
  app.appendChild(s3);

  // bookings management
  const head=el('div','section-head'); head.innerHTML=`<div><h2 style="font-size:18px">Bookings — add sale amount & status</h2><p>Set amount and mark sold / ran / cancelled. Feeds every sales metric.</p></div>`;
  const filt=el('div','seg');
  const fopts=[['open','Needs review'],['all','All'],['sold','Sold'],['cancelled','Cancelled']];
  STATE._bkFilter=STATE._bkFilter||'open';
  fopts.forEach(([k,l])=>{const b=el('button',STATE._bkFilter===k?'active':'',l);b.onclick=()=>{STATE._bkFilter=k;renderAdmin(app);};filt.appendChild(b);});
  head.appendChild(filt);
  app.appendChild(head);

  const wrap=el('div','card'); wrap.style.overflow='auto';
  let list=[...STATE.bookings].sort((x,y)=>y.report_date.localeCompare(x.report_date));
  if(STATE._bkFilter==='open') list=list.filter(x=>x.status==='pending');
  else if(STATE._bkFilter==='sold') list=list.filter(x=>x.status==='sold');
  else if(STATE._bkFilter==='cancelled') list=list.filter(x=>x.status==='cancelled');
  const nameOf=id=>{const a=STATE.agents.find(x=>x.id===id);return a?a.name:'—';};

  if(!list.length){ wrap.appendChild(el('div','empty','Nothing here.')); }
  else{
    const t=el('table','tbl');
    t.innerHTML=`<thead><tr><th>Date</th><th>Agent</th><th>Type</th><th>Job ref</th><th>Status</th><th>Sale amount</th></tr></thead>`;
    const tb=el('tbody');
    list.slice(0,300).forEach(x=>{
      const tr=el('tr');
      tr.innerHTML=`<td>${x.report_date}</td><td>${esc(nameOf(x.agent_id))}</td>
        <td><span class="tag ${x.kind}">${x.kind==='crossbooking'?'Cross':'Booking'}</span></td>
        <td class="jobref">${esc(x.job_ref)}</td>`;
      const tdS=el('td'); const sel=el('select','st-select');
      ['pending','sold','ran_not_sold','cancelled'].forEach(s=>{const o=el('option',null,s.replace('_',' '));o.value=s;if(x.status===s)o.selected=true;sel.appendChild(o);});
      sel.onchange=async()=>{ await updateBooking(x.id,{status:sel.value,updated_at:new Date().toISOString()}); toast('Status updated'); };
      tdS.appendChild(sel); tr.appendChild(tdS);
      const tdA=el('td'); const amt=el('input','amt-input'); amt.type='number'; amt.step='1'; amt.placeholder='0'; amt.value=x.sale_amount??'';
      amt.onchange=async()=>{ const v=amt.value===''?null:+amt.value; const patch={sale_amount:v,updated_at:new Date().toISOString()}; if(v!=null && x.status==='pending'){patch.status='sold';} await updateBooking(x.id,patch); toast('Amount saved'); renderAdmin(app); };
      tdA.appendChild(amt); tr.appendChild(tdA);
      tb.appendChild(tr);
    });
    t.appendChild(tb); wrap.appendChild(t);
  }
  app.appendChild(wrap);

  // agents + settings
  app.appendChild(renderAdminAgents(app));
  app.appendChild(renderAdminSettings());
}
async function updateBooking(id,patch){
  const {error}=await sb.from('bookings').update(patch).eq('id',id);
  if(error){toast('Update failed: '+error.message,true);return;}
  const b=STATE.bookings.find(x=>x.id===id); Object.assign(b,patch);
}
function renderAdminAgents(app){
  const box=el('div','card card-pad'); box.style.marginTop='24px';
  box.innerHTML=`<h2 style="font-size:18px;margin-bottom:4px">Agents</h2><p style="color:var(--muted);font-size:13px;margin:0 0 14px">Add agents and set weekly targets.</p>`;
  const t=el('table','tbl');
  t.innerHTML=`<thead><tr><th>Name</th><th>Active</th><th>Target bookings</th><th>Target cross</th><th></th></tr></thead>`;
  const tb=el('tbody');
  STATE.agents.forEach(a=>{
    const tr=el('tr');
    tr.innerHTML=`<td><b>${esc(a.name)}</b></td>`;
    const tdAct=el('td'); const chk=el('input');chk.type='checkbox';chk.checked=a.active;
    chk.onchange=async()=>{await sb.from('agents').update({active:chk.checked}).eq('id',a.id);a.active=chk.checked;toast('Saved');};
    tdAct.appendChild(chk); tr.appendChild(tdAct);
    ['target_bookings','target_crossbookings'].forEach(k=>{
      const td=el('td'); const inp=el('input','amt-input');inp.type='number';inp.value=a[k];inp.style.width='70px';
      inp.onchange=async()=>{await sb.from('agents').update({[k]:+inp.value}).eq('id',a.id);a[k]=+inp.value;toast('Saved');};
      td.appendChild(inp); tr.appendChild(td);
    });
    const tdX=el('td'); const del=el('button','btn tiny danger','Remove');
    del.onclick=async()=>{ if(!confirm('Remove '+a.name+'? Their reports & bookings are deleted.'))return; await sb.from('agents').delete().eq('id',a.id); await loadAll(); renderAdmin(app); toast('Removed'); };
    tdX.appendChild(del); tr.appendChild(tdX);
    tb.appendChild(tr);
  });
  t.appendChild(tb); box.appendChild(t);
  const add=el('div',''); add.style.cssText='display:flex;gap:10px;margin-top:14px;flex-wrap:wrap';
  add.innerHTML=`<input class="input" id="new_agent" placeholder="New agent name" style="max-width:240px">`;
  const btn=el('button','btn primary','Add agent');
  btn.onclick=async()=>{const n=$('#new_agent',box).value.trim();if(!n)return;const {error}=await sb.from('agents').insert({name:n,sort_order:STATE.agents.length+1});if(error){toast(error.message,true);return;}await loadAll();renderAdmin(app);toast('Agent added');};
  add.appendChild(btn); box.appendChild(add);
  return box;
}
function renderAdminSettings(){
  const box=el('div','card card-pad'); box.style.marginTop='24px';
  const c=loadConf()||{};
  box.innerHTML=`<h2 style="font-size:18px;margin-bottom:4px">Connection & security</h2>
    <p style="color:var(--muted);font-size:13px;margin:0 0 14px">Supabase project this board reads and writes.</p>
    <div class="sumline" style="border-top:0"><span>Supabase URL</span><b>${esc(c.url||'—')}</b></div>
    <div class="sumline"><span>Touch ID admin</span><b id="wa_state">checking…</b></div>
    <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap">
      <button class="btn" id="wa_add">Register this Mac's Touch ID</button>
      <button class="btn danger" id="wa_lock">Lock admin now</button>
      <button class="btn ghost" id="conf_edit">Change Supabase keys</button>
    </div>`;
  setTimeout(async()=>{
    const {data}=await sb.from('admin_credentials').select('id');
    $('#wa_state',box).textContent = (data&&data.length)? (data.length+' credential(s) registered') : 'not set up — first registration becomes admin';
  },10);
  box.querySelector('#wa_add').onclick=registerPasskey;
  box.querySelector('#wa_lock').onclick=()=>{STATE.isAdmin=false;sessionStorage.removeItem(LS.adminSession);go('scorecard');toast('Admin locked');};
  box.querySelector('#conf_edit').onclick=()=>renderSetup();
  return box;
}

/* =========================================================================
   Admin gate — WebAuthn / Touch ID
   ========================================================================= */
function renderAdminGate(){
  const app=$('#app'); app.innerHTML='';
  const wrap=el('div','center-wrap');
  const g=el('div','gate');
  g.innerHTML=`<div class="lockbig">🔒</div><h2>Admin access</h2>
    <p>Unlock with this Mac's Touch ID. The first time, register a fingerprint credential to become an admin.</p>`;
  const unlock=el('button','btn primary','Unlock with Touch ID'); unlock.style.width='100%'; unlock.style.marginBottom='10px';
  unlock.onclick=unlockWithPasskey;
  const reg=el('button','btn ghost','First time? Register Touch ID'); reg.style.width='100%';
  reg.onclick=registerPasskey;
  g.appendChild(unlock); g.appendChild(reg);
  const note=el('div',''); note.style.cssText='font-size:12px;color:var(--faint);margin-top:16px';
  note.textContent='Requires a passkey-capable browser (Safari/Chrome on macOS) served over HTTPS or localhost.';
  g.appendChild(note);
  wrap.appendChild(g); app.appendChild(wrap);
}
const b64url = {
  enc: buf => btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''),
  dec: str => { str=str.replace(/-/g,'+').replace(/_/g,'/'); const pad=str.length%4?4-str.length%4:0; str+='='.repeat(pad); const bin=atob(str); const b=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)b[i]=bin.charCodeAt(i); return b.buffer; }
};
async function registerPasskey(){
  if(!window.PublicKeyCredential){ toast('This browser has no passkey support',true); return; }
  try{
    const uid=new Uint8Array(16); crypto.getRandomValues(uid);
    const cred=await navigator.credentials.create({publicKey:{
      challenge:crypto.getRandomValues(new Uint8Array(32)),
      rp:{name:'ADC Outbound Board'},
      user:{id:uid,name:'admin@homealliance',displayName:'ADC Admin'},
      pubKeyCredParams:[{type:'public-key',alg:-7},{type:'public-key',alg:-257}],
      authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required',residentKey:'preferred'},
      timeout:60000, attestation:'none'
    }});
    const idb64=b64url.enc(cred.rawId);
    const {error}=await sb.from('admin_credentials').insert({credential_id:idb64,label:navigator.platform||'mac'});
    if(error) throw error;
    toast('Touch ID registered — you can unlock now');
    STATE.isAdmin=true; sessionStorage.setItem(LS.adminSession,'1'); go('admin');
  }catch(e){ toast('Registration cancelled: '+(e.message||e),true); }
}
async function unlockWithPasskey(){
  if(!window.PublicKeyCredential){ toast('This browser has no passkey support',true); return; }
  try{
    const {data}=await sb.from('admin_credentials').select('credential_id');
    if(!data||!data.length){ toast('No admin registered yet — register first',true); return; }
    const allow=data.map(r=>({type:'public-key',id:b64url.dec(r.credential_id)}));
    const assertion=await navigator.credentials.get({publicKey:{
      challenge:crypto.getRandomValues(new Uint8Array(32)),
      allowCredentials:allow, userVerification:'required', timeout:60000
    }});
    const got=b64url.enc(assertion.rawId);
    if(data.some(r=>r.credential_id===got)){
      STATE.isAdmin=true; sessionStorage.setItem(LS.adminSession,'1'); go('admin'); toast('Admin unlocked');
    }else{ toast('Unrecognized credential',true); }
  }catch(e){ toast('Unlock cancelled: '+(e.message||e),true); }
}

/* =========================================================================
   Modal
   ========================================================================= */
function showModal(title,badgeHTML,bodyHTML){
  const root=$('#modalRoot'); root.innerHTML='';
  const back=el('div','modal-back'); const m=el('div','modal');
  m.innerHTML=`<div class="modal-head">${badgeHTML||''}<h2 style="font-size:18px">${esc(title)}</h2><button class="x">×</button></div><div class="modal-body">${bodyHTML}</div>`;
  m.querySelector('.x').onclick=()=>root.innerHTML='';
  back.onclick=e=>{if(e.target===back)root.innerHTML='';};
  back.appendChild(m); root.appendChild(back);
  document.addEventListener('keydown',function esc(ev){if(ev.key==='Escape'){root.innerHTML='';document.removeEventListener('keydown',esc);}});
}

/* =========================================================================
   Setup screen (Supabase config)
   ========================================================================= */
function renderSetup(errMsg){
  const app=$('#app'); app.innerHTML='';
  const c=loadConf()||{};
  const sqlText = SCHEMA_SQL;
  const wrap=el('div','center-wrap'); const g=el('div','gate'); g.style.maxWidth='560px';
  g.innerHTML=`<div class="lockbig">🔌</div><h2>Connect Supabase</h2>
    <p>Paste your project URL and <b>anon public</b> key (Supabase → Project Settings → API). Stored on this device only.</p>
    ${errMsg?`<div class="tag cancelled" style="display:block;padding:8px;margin-bottom:12px">${esc(errMsg)}</div>`:''}
    <div style="text-align:left">
      <label class="fld">Project URL</label>
      <input class="input" id="cf_url" placeholder="https://xxxx.supabase.co" value="${esc(c.url||'')}" style="margin-bottom:12px">
      <label class="fld">Anon public key</label>
      <input class="input" id="cf_key" placeholder="eyJhbGciOi…" value="${esc(c.key||'')}" style="margin-bottom:16px">
    </div>`;
  const save=el('button','btn primary','Connect'); save.style.width='100%';
  save.onclick=async()=>{
    const url=$('#cf_url',g).value.trim().replace(/\/$/,''); const key=$('#cf_key',g).value.trim();
    if(!url||!key){toast('Both fields required',true);return;}
    saveConf({url,key}); save.textContent='Connecting…';
    if(await connect()){ await boot(); }
  };
  g.appendChild(save);
  const details=el('details',''); details.style.cssText='margin-top:18px;text-align:left';
  details.innerHTML=`<summary style="cursor:pointer;font-size:13px;color:var(--muted)">Step 1 — run this SQL in Supabase first</summary>
    <div class="codebox" style="margin-top:10px">${esc(sqlText)}</div>`;
  g.appendChild(details);
  wrap.appendChild(g); app.appendChild(wrap);
}

/* =========================================================================
   Boot
   ========================================================================= */
async function boot(){
  if(sessionStorage.getItem(LS.adminSession)==='1') STATE.isAdmin=true;
  renderNav();
  await loadAll();
  render();
}
(async function(){
  renderNav();
  if(await connect()){ await boot(); }
})();
</script>
